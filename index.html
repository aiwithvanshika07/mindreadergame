<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Luck Hub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    color: white;
    width: 300px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}
h1 {
    color: #34d399;
}
.price {
    font-size: 40px;
    margin: 20px 0;
}
button {
    background: #34d399;
    border: none;
    padding: 15px 30px;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
}
button:hover {
    opacity: 0.8;
}
</style>

</head>

<body>

<div class="card">
    <h1>Good Luck Hub</h1>
    <p>Unlock your daily dose of good fortune and positive energy!</p>
    <div class="price">₹10</div>

    <button onclick="goToQR()">Pay Now</button>
</div>

<script>
function goToQR() {
    window.location.href = "qr.html";
}
</script>

</body>
</html>
